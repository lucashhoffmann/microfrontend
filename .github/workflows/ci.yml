name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint affected projects
        run: pnpm nx affected -t lint --parallel=3

      - name: Test affected projects
        run: pnpm nx affected -t test --parallel=3

      - name: Build affected projects
        run: pnpm nx affected -t build --parallel=3

  remotes-smoke:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        project: [auth, billing, wallet, analytics, shell]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone project
        run: pnpm nx run ${{ matrix.project }}:build
